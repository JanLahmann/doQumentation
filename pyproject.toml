# Python tooling config for doQumentation's pipeline scripts.
# (The project is primarily a Docusaurus/TS site; this covers the Python
# translation + sync scripts.)

[tool.pytest.ini_options]
# Unit tests for the translation pipeline's pure functions. All are string-in /
# value-out — no network, git, or filesystem — so the suite runs in <1s and is
# safe to gate PRs on. See translation/scripts/tests/.
testpaths = ["translation/scripts/tests"]
python_files = ["test_*.py"]
addopts = "-q"
