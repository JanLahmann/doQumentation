# Rate limiting zones — protect against abuse
# build: 300r/m + burst=120 — sized so an 80+-person single-pod workshop where
# everyone clicks "Start" within seconds (NAT/conference WiFi shares one source
# IP) does not 503. Earlier 5r/m was abuse-protection from a generic template;
# 100r/m+burst50 still 503'd the tail of an 80-user class once the burst drained
# at 1.67r/s. The SSE shim is cheap (~2 calls to /api/status); the real
# bottleneck is Jupyter kernel resources, gated by token auth on /api/. The
# frontend also staggers SSE opens over ~3s (STAGGER_MAX_MS) so excess requests
# queue (see `burst` without `nodelay` below) instead of stampeding.
limit_req_zone $binary_remote_addr zone=build:1m rate=300r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=terminals:1m rate=10r/m;

# Token-safe access log format: logs $uri (path only) instead of $request, so
# the `?token=…` query string on /api/ and /lab requests never lands in the
# access log. Mitigates the token-leakage-via-logs vector (token is the auth
# boundary here — XSRF is disabled — so keeping it out of logs matters).
log_format token_safe '$remote_addr - $remote_user [$time_local] '
                      '"$request_method $uri $server_protocol" '
                      '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

server {
    listen 8080;
    server_name _;
    client_max_body_size 10m;

    # Apply the token-stripping log format to all locations (each location can
    # still override with `access_log off`, e.g. /health and /stats below).
    access_log /var/log/nginx/access.log token_safe;

    # Close keepalive connections promptly so the Knative queue-proxy
    # sees zero in-flight requests when idle. Without this, nginx holds
    # HTTP/1.1 keepalive connections open indefinitely, which prevents
    # CE/Knative from scaling the pod to zero.
    keepalive_timeout 0;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss: ws:; img-src 'self' data: blob:; font-src 'self' data:; frame-ancestors 'self'" always;

    # SSE /build/ endpoint — Binder-compatible protocol for thebelab
    location /build/ {
        # burst without nodelay: requests over the rate queue (brief delay) rather
        # than 503 — pairs with the frontend connect stagger to absorb the
        # workshop-start storm from a single shared NAT IP.
        limit_req zone=build burst=120;
        proxy_pass http://127.0.0.1:9091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE: disable buffering so events stream immediately
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    # Jupyter API — proxy to Jupyter server
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        # Long timeout for WebSocket kernel connections
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }

    # Jupyter Lab — no rate limiting (token auth protects access;
    # JupyterLab loads dozens of JS/CSS chunks under /lab/ on first view)
    location /lab {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 7200s;
    }

    # Jupyter terminals — WebSocket proxy
    location /terminals/ {
        limit_req zone=terminals burst=5 nodelay;
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 7200s;
    }

    # Jupyter static assets
    location /static/ {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
    }

    # Jupyter user endpoint (needed by thebelab for kernel management)
    location /user/ {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 7200s;
    }

    # Health check — handled by SSE server (no auth needed)
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:9091;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # Workshop stats — kernel count for organizer dashboard (no auth needed)
    location = /stats {
        access_log off;
        proxy_pass http://127.0.0.1:9091;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # Default — proxy to Jupyter (handles root, favicon, etc.)
    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
