# Rate limiting zones — protect against abuse
limit_req_zone $binary_remote_addr zone=build:1m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=terminals:1m rate=10r/m;

server {
    listen 8080;
    server_name _;
    client_max_body_size 10m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss: ws:; img-src 'self' data: blob:; font-src 'self' data:; frame-ancestors 'self'" always;

    # SSE /build/ endpoint — Binder-compatible protocol for thebelab
    location /build/ {
        limit_req zone=build burst=2 nodelay;
        proxy_pass http://127.0.0.1:9091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE: disable buffering so events stream immediately
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    # Jupyter API — proxy to Jupyter server
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        # Long timeout for WebSocket kernel connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Jupyter Lab — no rate limiting (token auth protects access;
    # JupyterLab loads dozens of JS/CSS chunks under /lab/ on first view)
    location /lab {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # Jupyter terminals — WebSocket proxy
    location /terminals/ {
        limit_req zone=terminals burst=5 nodelay;
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # Jupyter static assets
    location /static/ {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
    }

    # Jupyter user endpoint (needed by thebelab for kernel management)
    location /user/ {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # Health check — handled by SSE server (no auth needed)
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:9091;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # Workshop stats — kernel count for organizer dashboard (no auth needed)
    location = /stats {
        access_log off;
        proxy_pass http://127.0.0.1:9091;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # Default — proxy to Jupyter (handles root, favicon, etc.)
    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
