name: Workshop Start

# Workshop lifecycle: START.
#
# Run this workflow at the start of a workshop to:
#   1. Optionally resize the pod(s) to a specific CPU/memory config
#   2. Optionally reset Jupyter's peak counters (trigger fresh revision)
#   3. Warm the pod (single /stats request — eliminates cold-start tax
#      for the first real student)
#   4. Post setup instructions (pod URL, token retrieval, student guide)
#
# Monitoring is handled separately by the Workshop Monitor workflow,
# which can be started independently or triggered from here via the
# start_monitor option. This keeps Workshop Start fast (~2 min) and
# avoids tying up a runner for hours if monitoring isn't needed.

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'CE project name'
        default: 'doQumentation-02'
        type: string
      app_name:
        description: 'CE app name prefix (instances are named prefix-01, prefix-02, ...)'
        default: 'doqumentation'
        type: string
      instance_count:
        description: 'Number of CE instances (1 for ≤80 users, 2-3 for larger workshops)'
        default: '1'
        type: choice
        options: ['1', '2', '3', '5']
      size:
        description: 'Pod size (or keep current)'
        default: '(keep current)'
        type: choice
        options:
          - '(keep current)'
          - '1 vCPU / 2 GB'
          - '1 vCPU / 4 GB'
          - '2 vCPU / 4 GB'
          - '2 vCPU / 8 GB'
          - '4 vCPU / 8 GB'
          - '4 vCPU / 16 GB'
          - '8 vCPU / 16 GB'
          - '8 vCPU / 32 GB'
          - '12 vCPU / 24 GB'
          - '12 vCPU / 48 GB'
      reset_peaks:
        description: 'Reset pod (fresh revision) to clear leftover zombie kernels and peak counters'
        default: true
        type: boolean
      custom_token:
        description: 'Jupyter token (leave empty to auto-generate a fresh 32-char random token)'
        default: ''
        type: string

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install code-engine -f

      - name: Login and select project
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
          PROJECT: ${{ inputs.project }}
        run: |
          ibmcloud login --apikey "$IBM_CLOUD_API_KEY" -r eu-de -g Default --quiet
          ibmcloud ce project select --name "$PROJECT"

      - name: Generate or validate Jupyter token
        id: token
        env:
          CUSTOM_TOKEN: ${{ github.event.inputs.custom_token }}
        run: |
          if [ -z "$CUSTOM_TOKEN" ]; then
            # Auto-generate a fresh 32-char hex token. /dev/urandom is
            # cryptographically secure and portable across ubuntu runners.
            TOKEN=$(head -c 16 /dev/urandom | xxd -p)
            echo "=== Auto-generated fresh Jupyter token (32 chars) ==="
          else
            TOKEN="$CUSTOM_TOKEN"
            # Validate against the container entrypoint regex (same as
            # binder/codeengine-entrypoint.sh validation)
            if [ ${#TOKEN} -lt 32 ]; then
              echo "ERROR: custom_token must be at least 32 characters (got ${#TOKEN})"
              exit 1
            fi
            if ! echo "$TOKEN" | grep -qE '^[a-zA-Z0-9_-]+$'; then
              echo "ERROR: custom_token must contain only letters, numbers, dashes, underscores"
              exit 1
            fi
            echo "=== Using instructor-supplied token (${#TOKEN} chars) ==="
          fi
          # Mask the token in logs (auto-redacts in subsequent steps)
          echo "::add-mask::$TOKEN"
          # Pass to next steps via step output
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Update pod(s) (resize + token + fresh revision)
        env:
          APP_PREFIX: ${{ github.event.inputs.app_name }}
          INSTANCE_COUNT: ${{ github.event.inputs.instance_count }}
          SIZE: ${{ github.event.inputs.size }}
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          # Build sizing flags (shared across all instances)
          SIZE_ARGS=""
          if [ "$SIZE" != "(keep current)" ]; then
            CPU=$(echo "$SIZE" | sed -E 's/^([0-9]+) vCPU.*/\1/')
            MEM=$(echo "$SIZE" | sed -E 's/.*\/ ([0-9]+) GB.*/\1G/')
            SIZE_ARGS="--cpu $CPU --memory $MEM"
          fi

          # Update each instance with the SAME token + optional resize
          for i in $(seq 1 "$INSTANCE_COUNT"); do
            APP_NAME="${APP_PREFIX}-$(printf "%02d" "$i")"
            UPDATE_ARGS="--name $APP_NAME --env JUPYTER_TOKEN=$TOKEN $SIZE_ARGS"

            if ibmcloud ce app get --name "$APP_NAME" &>/dev/null; then
              echo "=== Updating $APP_NAME ==="
              ibmcloud ce app update $UPDATE_ARGS
            else
              echo "=== WARNING: $APP_NAME does not exist. Run the Code Engine Image workflow first to create it. ==="
            fi
          done

          echo "=== Waiting 60s for new revision(s) to become ready ==="
          sleep 60

      - name: Discover app URL(s) and build pool config
        id: ce
        env:
          APP_PREFIX: ${{ github.event.inputs.app_name }}
          INSTANCE_COUNT: ${{ github.event.inputs.instance_count }}
        run: |
          # Collect URLs from all instances
          URLS=""
          POOL_JSON="["
          for i in $(seq 1 "$INSTANCE_COUNT"); do
            APP_NAME="${APP_PREFIX}-$(printf "%02d" "$i")"
            URL=$(ibmcloud ce app get --name "$APP_NAME" --output json 2>/dev/null \
              | jq -r '.status.url // empty')
            if [ -n "$URL" ]; then
              URL="${URL%/}"  # strip trailing slash
              [ "$POOL_JSON" != "[" ] && POOL_JSON="${POOL_JSON},"
              POOL_JSON="${POOL_JSON}\"${URL}\""
              # First URL is the primary (used for /stats monitoring + warm-up)
              [ -z "$URLS" ] && URLS="$URL"
            else
              echo "WARNING: Could not get URL for $APP_NAME"
            fi
          done
          POOL_JSON="${POOL_JSON}]"

          if [ -z "$URLS" ]; then
            echo "ERROR: No instance URLs found"
            exit 1
          fi

          echo "url=$URLS" >> "$GITHUB_OUTPUT"
          echo "instance_count=$INSTANCE_COUNT" >> "$GITHUB_OUTPUT"

          # Build base64-encoded pool config (NO token inside — security)
          # Students paste this into the "Workshop Pod URL(s)" field on the
          # Settings page, then enter the token separately.
          POOL_CONFIG="{\"pool\":${POOL_JSON}}"
          POOL_B64=$(printf '%s' "$POOL_CONFIG" | base64 -w0)
          echo "pool_b64=$POOL_B64" >> "$GITHUB_OUTPUT"
          echo "pool_json=$POOL_CONFIG" >> "$GITHUB_OUTPUT"

          echo "=== Pool: $POOL_CONFIG ==="
          echo "=== Monitoring primary: $URLS ==="

      - name: Warm pod
        env:
          URL: ${{ steps.ce.outputs.url }}
        run: |
          echo "=== Warming pod with a /stats request (eliminates cold-start tax) ==="
          for attempt in 1 2 3 4 5; do
            if curl -sS -m 30 -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" "${URL}stats"; then
              break
            fi
            echo "  attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "=== Pod is warm and ready for workshop ==="

      - name: Post workshop setup instructions to summary
        env:
          URL: ${{ steps.ce.outputs.url }}
          INSTANCE_COUNT: ${{ steps.ce.outputs.instance_count }}
          POOL_B64: ${{ steps.ce.outputs.pool_b64 }}
          POOL_JSON: ${{ steps.ce.outputs.pool_json }}
          APP_PREFIX: ${{ github.event.inputs.app_name }}
          PROJECT: ${{ inputs.project }}
        run: |
          POOL_URL="${URL%/}"
          # Look up project ID dynamically for Console URL
          PROJECT_ID=$(ibmcloud ce project current --output json 2>/dev/null \
            | jq -r '.guid // empty' 2>/dev/null || echo "unknown")

          # Decide what to show students for the URL field:
          # - Single pod: just the URL (simplest)
          # - Multi-pod: base64-encoded pool config (students paste this opaque string)
          if [ "$INSTANCE_COUNT" = "1" ]; then
            STUDENT_URL_VALUE="$POOL_URL"
            STUDENT_URL_LABEL="the pod URL"
          else
            STUDENT_URL_VALUE="$POOL_B64"
            STUDENT_URL_LABEL="the pool config string below"
          fi

          {
            echo "## Workshop Ready"
            echo ""
            echo "### For the instructor"
            echo ""
            if [ "$INSTANCE_COUNT" = "1" ]; then
              echo "**Pod URL (share with participants):**"
              echo '```'
              echo "$POOL_URL"
              echo '```'
            else
              echo "**$INSTANCE_COUNT instances configured.** Pool:"
              echo '```json'
              echo "$POOL_JSON"
              echo '```'
              echo ""
              echo "**Pool config for students** (paste this into the URL field — no token inside, safe to share publicly):"
              echo '```'
              echo "$POOL_B64"
              echo '```'
            fi
            echo ""
            echo "**Retrieve the Jupyter token** (do NOT share via public channels — share verbally, via printed handout, or private chat):"
            echo ""
            echo "- **IBM Cloud Console:** [Environment Variables page](https://cloud.ibm.com/codeengine/project/eu-de/${PROJECT_ID}/application/${APP_PREFIX}-01/configuration) → find \`JUPYTER_TOKEN\`"
            echo "- **CLI:** \`ibmcloud ce app get --name ${APP_PREFIX}-01 --output json | jq -r '.spec.template.spec.containers[0].env[] | select(.name==\"JUPYTER_TOKEN\") | .value'\`"
            echo ""
            echo "### For participants"
            echo ""
            echo "Share these instructions with students (e.g., on a slide or handout):"
            echo ""
            echo "1. Open [doqumentation.org/jupyter-settings](https://doqumentation.org/jupyter-settings#code-engine)"
            echo "2. Scroll to **Code Engine** → **Join Workshop**"
            echo "3. Paste $STUDENT_URL_LABEL into the **Workshop Pod URL(s)** field"
            echo "4. Enter the **Workshop Token** (from the instructor)"
            echo "5. Click **Join Workshop**"
            echo "6. Navigate to any tutorial or guide and click **Run** — code executes on the workshop pod"
            echo ""
            echo "### Token security"
            echo ""
            echo "- The token was freshly generated for this workshop and set on all pod(s)"
            echo "- The token is NOT posted in this summary (this repo is public)"
            echo "- The pool config above contains only URLs, no token"
            echo "- After the workshop, run [Workshop Close](../../../actions/workflows/workshop-close.yml) with \`rotate_token=true\` (default) to invalidate the token"
            echo ""
            echo "To monitor pod health during the workshop, run the [Workshop Monitor](../../../actions/workflows/workshop-monitor.yml) workflow separately."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          echo "=== Workshop instructions posted to job summary ==="
          echo "=== Token NOT in summary — pool config is safe (no token inside) ==="
