name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Sync upstream content
        run: python3 scripts/sync-content.py

      - name: Install dependencies
        run: npm ci

      - name: Encrypt admin URLs
        if: ${{ secrets.UMAMI_SHARE_URL != '' && secrets.ADMIN_PASSWORD != '' }}
        id: encrypt
        run: |
          BLOB=$(ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" node scripts/encrypt-for-admin.mjs "${{ secrets.UMAMI_SHARE_URL }}")
          echo "umami_share=${BLOB}" >> "$GITHUB_OUTPUT"

      - name: Build site (English only)
        run: npx docusaurus build --locale en
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_ENCRYPTED_UMAMI_SHARE_URL: ${{ steps.encrypt.outputs.umami_share }}

      - name: Push notebooks to notebooks branch
        run: |
          TOKEN_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

          # Clone existing notebooks branch (preserves locale subdirs from deploy-locales)
          git clone --depth 1 --branch notebooks "$TOKEN_URL" notebooks-repo 2>/dev/null || {
            mkdir notebooks-repo && cd notebooks-repo && git init && git checkout -b notebooks && cd ..
          }
          cd notebooks-repo

          # Remove EN content only (keep locale subdirs like de/, es/, etc.)
          for d in tutorials guides learning docs; do rm -rf "$d" 2>/dev/null; done

          # Copy fresh EN notebooks from build output
          cp -r ../build/notebooks/* .

          # Binder config — copy Dockerfile + requirements from repo.
          # Dockerfile installs from jupyter-requirements.txt (full Qiskit ecosystem).
          mkdir -p binder
          cp ../binder/Dockerfile binder/Dockerfile
          cp ../binder/jupyter-requirements.txt binder/jupyter-requirements.txt

          git add -A
          git diff --cached --quiet && echo "No notebook changes" && exit 0
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "Update EN notebooks + Binder config from ${{ github.sha }}"
          git push --force "$TOKEN_URL" notebooks

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
