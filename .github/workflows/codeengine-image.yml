name: Code Engine Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.jupyter'
      - 'binder/**'
      - 'nginx.conf'
      - '.trivyignore'
      - '.github/workflows/codeengine-image.yml'
  workflow_dispatch:
    inputs:
      instance_count:
        description: 'Number of CE instances (workshop mode)'
        default: '1'
        type: choice
        options: ['1', '2', '3', '5', '10']
      cpu:
        description: 'vCPUs per instance'
        default: '1'
        type: choice
        options: ['1', '2', '4', '8', '12']
      memory:
        description: 'Memory per instance'
        default: '4G'
        type: choice
        options: ['2G', '4G', '8G', '16G', '24G']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: janlahmann/doqumentation-codeengine

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jupyter
          target: jupyter-codeengine
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Deploy to Code Engine
        if: github.ref == 'refs/heads/main'
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
          INSTANCE_COUNT: ${{ github.event.inputs.instance_count || '1' }}
          INSTANCE_CPU: ${{ github.event.inputs.cpu || '1' }}
          INSTANCE_MEMORY: ${{ github.event.inputs.memory || '4G' }}
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install code-engine -f
          ibmcloud login --apikey "$IBM_CLOUD_API_KEY" -r eu-de -g Default --quiet
          ibmcloud ce project select --name ce-doqumentation-01

          for i in $(seq -w 1 "$INSTANCE_COUNT"); do
            APP_NAME="ce-doqumentation-${i}"
            echo "=== Deploying $APP_NAME (${INSTANCE_CPU} vCPU / ${INSTANCE_MEMORY}) ==="
            if ibmcloud ce app get --name "$APP_NAME" &>/dev/null; then
              ibmcloud ce app update \
                --name "$APP_NAME" \
                --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
                --cpu "$INSTANCE_CPU" --memory "$INSTANCE_MEMORY"
            else
              ibmcloud ce app create \
                --name "$APP_NAME" \
                --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
                --port 8080 --min-scale 0 --max-scale 1 \
                --cpu "$INSTANCE_CPU" --memory "$INSTANCE_MEMORY"
            fi
          done

      - name: Generate workshop URL
        if: github.ref == 'refs/heads/main' && (github.event.inputs.instance_count || '1') != '1'
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
          INSTANCE_COUNT: ${{ github.event.inputs.instance_count || '1' }}
        run: |
          # Collect all instance URLs
          POOL="["
          for i in $(seq -w 1 "$INSTANCE_COUNT"); do
            APP_NAME="ce-doqumentation-${i}"
            URL=$(ibmcloud ce app get --name "$APP_NAME" --output json 2>/dev/null \
              | jq -r '.status.url // empty')
            if [ -n "$URL" ]; then
              [ "$POOL" != "[" ] && POOL="${POOL},"
              POOL="${POOL}\"${URL}\""
            fi
          done
          POOL="${POOL}]"

          # Build workshop config (token must be set manually — not exposed in app config)
          CONFIG="{\"pool\":${POOL},\"token\":\"SET_YOUR_TOKEN_HERE\"}"
          ENCODED=$(echo -n "$CONFIG" | base64 -w0)

          echo ""
          echo "=============================================="
          echo "  Workshop URL (set token before sharing!):"
          echo "  https://doqumentation.org/jupyter-settings#workshop=${ENCODED}"
          echo ""
          echo "  Pool: ${POOL}"
          echo "  Instances: ${INSTANCE_COUNT}"
          echo "=============================================="
