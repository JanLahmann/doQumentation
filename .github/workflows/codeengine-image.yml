name: Code Engine Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.jupyter'
      - 'binder/**'
      - 'nginx.conf'
      - '.trivyignore'
      - '.github/workflows/codeengine-image.yml'
  workflow_dispatch:
    inputs:
      project:
        description: 'CE project name'
        default: 'doQumentation-02'
        type: string
      instance_count:
        description: 'Number of CE instances (workshop mode)'
        default: '1'
        type: choice
        options: ['1', '2', '3', '5', '10']
      cpu:
        description: 'vCPUs per instance (leave empty to preserve current pod size)'
        default: ''
        type: choice
        options: ['', '1', '2', '4', '8', '12']
      memory:
        description: 'Memory per instance (leave empty to preserve current pod size)'
        default: ''
        type: choice
        options: ['', '2G', '4G', '8G', '16G', '24G']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: janlahmann/doqumentation-codeengine

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jupyter
          target: jupyter-codeengine
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Deploy to Code Engine
        if: github.ref == 'refs/heads/main'
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
          PROJECT: ${{ github.event.inputs.project || 'doQumentation-02' }}
          INSTANCE_COUNT: ${{ github.event.inputs.instance_count || '1' }}
          # Empty string by default — only set when user explicitly chose
          # in workflow_dispatch UI. Preserves existing pod size on push.
          INSTANCE_CPU: ${{ github.event.inputs.cpu }}
          INSTANCE_MEMORY: ${{ github.event.inputs.memory }}
          # Defaults used ONLY when CREATING a new app (cpu/memory required by CE)
          DEFAULT_CPU: '4'
          DEFAULT_MEMORY: '8G'
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install code-engine -f
          ibmcloud login --apikey "$IBM_CLOUD_API_KEY" -r eu-de -g Default --quiet
          ibmcloud ce project select --name "$PROJECT"

          # Sizing logic:
          # - On push (no inputs): INSTANCE_CPU and INSTANCE_MEMORY are empty.
          #   `ce app update` is called WITHOUT --cpu / --memory, preserving
          #   the current pod size. This fixes the workflow gotcha that
          #   reset the pod to 1 vCPU / 4 GB on every container code push.
          # - On workflow_dispatch with user-supplied values: pass those values.
          # - On `ce app create` (new app, never existed): cpu/memory are
          #   required by CE, so fall back to DEFAULT_CPU / DEFAULT_MEMORY
          #   (4 vCPU / 8 GB — actually useful for workshops, unlike the
          #   old 1 vCPU / 4 GB defaults).

          # Build update args conditionally
          UPDATE_SIZE_ARGS=""
          if [ -n "$INSTANCE_CPU" ]; then
            UPDATE_SIZE_ARGS="$UPDATE_SIZE_ARGS --cpu $INSTANCE_CPU"
          fi
          if [ -n "$INSTANCE_MEMORY" ]; then
            UPDATE_SIZE_ARGS="$UPDATE_SIZE_ARGS --memory $INSTANCE_MEMORY"
          fi

          # Build create args (cpu/memory required by CE — use overrides if
          # provided, otherwise sensible defaults)
          CREATE_CPU="${INSTANCE_CPU:-$DEFAULT_CPU}"
          CREATE_MEMORY="${INSTANCE_MEMORY:-$DEFAULT_MEMORY}"

          if [ -z "$UPDATE_SIZE_ARGS" ]; then
            echo "=== Sizing: PRESERVING current pod size on update (no --cpu/--memory args) ==="
          else
            echo "=== Sizing override:$UPDATE_SIZE_ARGS ==="
          fi

          # NOTE: must use printf "%02d" not "seq -w" — seq -w only zero-pads
          # when the upper bound has 2+ digits, so "seq -w 1 1" returns "1"
          # not "01". Without this fix, deploys for 1-9 instances create the
          # wrong app names (doqumentation-1 instead of doqumentation-01),
          # diverging from the documented names in src/pages/workshop-setup.mdx
          # and src/pages/admin.tsx.
          for i in $(seq 1 "$INSTANCE_COUNT"); do
            APP_NAME="doqumentation-$(printf "%02d" "$i")"
            if ibmcloud ce app get --name "$APP_NAME" &>/dev/null; then
              echo "=== Updating $APP_NAME (existing app) ==="
              ibmcloud ce app update \
                --name "$APP_NAME" \
                --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
                $UPDATE_SIZE_ARGS
            else
              echo "=== Creating $APP_NAME (new app, ${CREATE_CPU} vCPU / ${CREATE_MEMORY}) ==="
              ibmcloud ce app create \
                --name "$APP_NAME" \
                --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
                --port 8080 --min-scale 0 --max-scale 1 \
                --cpu "$CREATE_CPU" --memory "$CREATE_MEMORY"
            fi
          done

      - name: Generate workshop URL
        if: github.ref == 'refs/heads/main' && (github.event.inputs.instance_count || '1') != '1'
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
          PROJECT: ${{ github.event.inputs.project || 'doQumentation-02' }}
          INSTANCE_COUNT: ${{ github.event.inputs.instance_count || '1' }}
        run: |
          # Collect all instance URLs (matches deploy step's printf %02d)
          POOL="["
          for i in $(seq 1 "$INSTANCE_COUNT"); do
            APP_NAME="doqumentation-$(printf "%02d" "$i")"
            URL=$(ibmcloud ce app get --name "$APP_NAME" --output json 2>/dev/null \
              | jq -r '.status.url // empty')
            if [ -n "$URL" ]; then
              [ "$POOL" != "[" ] && POOL="${POOL},"
              POOL="${POOL}\"${URL}\""
            fi
          done
          POOL="${POOL}]"

          # Build workshop config (token must be set manually — not exposed in app config)
          CONFIG="{\"pool\":${POOL},\"token\":\"SET_YOUR_TOKEN_HERE\"}"
          ENCODED=$(echo -n "$CONFIG" | base64 -w0)

          echo ""
          echo "=============================================="
          echo "  Workshop URL (set token before sharing!):"
          echo "  https://doqumentation.org/jupyter-settings#workshop=${ENCODED}"
          echo ""
          echo "  Pool: ${POOL}"
          echo "  Instances: ${INSTANCE_COUNT}"
          echo "=============================================="
