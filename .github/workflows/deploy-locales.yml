name: Deploy Locale Sites

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "locales"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - locale: de
            repo: JanLahmann/doqumentation-de
          - locale: es
            repo: JanLahmann/doqumentation-es
          - locale: uk
            repo: JanLahmann/doqumentation-uk
          - locale: fr
            repo: JanLahmann/doqumentation-fr
          - locale: it
            repo: JanLahmann/doqumentation-it
          - locale: pt
            repo: JanLahmann/doqumentation-pt
          - locale: ja
            repo: JanLahmann/doqumentation-ja
          - locale: tl
            repo: JanLahmann/doqumentation-tl
          - locale: ar
            repo: JanLahmann/doqumentation-ar
          - locale: he
            repo: JanLahmann/doqumentation-he
          - locale: swg
            repo: JanLahmann/doqumentation-swg
          - locale: bad
            repo: JanLahmann/doqumentation-bad
          - locale: bar
            repo: JanLahmann/doqumentation-bar
          - locale: ksh
            repo: JanLahmann/doqumentation-ksh
          - locale: nds
            repo: JanLahmann/doqumentation-nds
          - locale: gsw
            repo: JanLahmann/doqumentation-gsw
          - locale: sax
            repo: JanLahmann/doqumentation-sax
          - locale: bln
            repo: JanLahmann/doqumentation-bln
          - locale: aut
            repo: JanLahmann/doqumentation-aut
          - locale: ms
            repo: JanLahmann/doqumentation-ms
          - locale: id
            repo: JanLahmann/doqumentation-id
          - locale: th
            repo: JanLahmann/doqumentation-th
          - locale: ko
            repo: JanLahmann/doqumentation-ko
          - locale: pl
            repo: JanLahmann/doqumentation-pl
          - locale: ro
            repo: JanLahmann/doqumentation-ro
          - locale: cs
            repo: JanLahmann/doqumentation-cs
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Sync upstream content
        run: python3 scripts/sync-content.py

      - name: Populate locale fallbacks
        run: python3 translation/scripts/translate-content.py populate-locale --locale ${{ matrix.locale }}

      - name: Generate translated notebooks
        run: python3 scripts/sync-content.py --generate-locale-notebooks --locale ${{ matrix.locale }}

      - name: Install dependencies
        run: npm ci

      - name: Encrypt admin URLs
        id: encrypt
        if: env.ADMIN_PASSWORD != '' && env.UMAMI_SHARE_URL != ''
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          UMAMI_SHARE_URL: ${{ secrets.UMAMI_SHARE_URL }}
        run: |
          BLOB=$(node scripts/encrypt-for-admin.mjs "$UMAMI_SHARE_URL")
          echo "umami_share=${BLOB}" >> "$GITHUB_OUTPUT"

      - name: Build locale site
        run: npx docusaurus build --locale ${{ matrix.locale }}
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          DQ_LOCALE_URL: 'https://${{ matrix.locale }}.doqumentation.org'
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_ENCRYPTED_UMAMI_SHARE_URL: ${{ steps.encrypt.outputs.umami_share }}

      - name: Deploy to satellite repo
        env:
          DEPLOY_KEY: ${{ secrets[format('DEPLOY_KEY_{0}', matrix.locale)] }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "::warning::No deploy key found for locale ${{ matrix.locale }}. Skipping deploy."
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

          # Clone existing gh-pages or create fresh branch
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key" \
            git clone --depth 1 --branch gh-pages \
            git@github.com:${{ matrix.repo }}.git \
            satellite-repo 2>/dev/null || {
              mkdir satellite-repo && cd satellite-repo
              git init && git checkout -b gh-pages && cd ..
            }

          # Replace satellite contents with fresh build
          cd satellite-repo
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          cp -r ../build/* .

          # Write CNAME for GitHub Pages custom domain
          echo "${{ matrix.locale }}.doqumentation.org" > CNAME

          # Include license and attribution files
          cp ../LICENSE ../LICENSE-DOCS ../NOTICE .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy ${{ matrix.locale }} locale ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key" git push origin gh-pages --force

      - name: Push locale notebooks to satellite notebooks branch
        # Source for nbgitpuller — QuBins-launched Lab sessions clone notebooks
        # from github.com/JanLahmann/doqumentation-{locale}/tree/notebooks at
        # session launch time. See src/config/jupyter.ts getBinderLabUrl().
        env:
          DEPLOY_KEY: ${{ secrets[format('DEPLOY_KEY_{0}', matrix.locale)] }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "::warning::No deploy key for ${{ matrix.locale }}; skipping notebooks push."
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

          # Each satellite is single-locale — branch holds tutorials/, guides/,
          # etc. at the root (no locale prefix subdir).
          # First time through, `notebooks` doesn't exist on the satellite yet,
          # so the clone fails and we bootstrap an empty repo with the remote
          # pointed at the satellite (the push below creates the branch).
          SATELLITE_URL="git@github.com:${{ matrix.repo }}.git"
          if ! GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key" \
                 git clone --depth 1 --branch notebooks \
                 "$SATELLITE_URL" satellite-notebooks 2>/dev/null; then
            mkdir satellite-notebooks
            (
              cd satellite-notebooks
              git init -b notebooks
              git remote add origin "$SATELLITE_URL"
            )
          fi

          cd satellite-notebooks
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          cp -r ../build/notebooks/* .
          cp ../LICENSE ../LICENSE-DOCS ../NOTICE .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No notebook changes for ${{ matrix.locale }}" && exit 0
          git commit -m "Update ${{ matrix.locale }} notebooks ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key" git push origin notebooks --force

      - name: Upload locale notebooks
        uses: actions/upload-artifact@v7
        with:
          name: notebooks-${{ matrix.locale }}
          path: build/notebooks/
          retention-days: 1

  update-notebooks:
    needs: build-and-deploy
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Download all locale notebook artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: notebooks-*
          path: locale-notebooks/

      - name: Push locale notebooks to notebooks branch
        run: |
          TOKEN_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

          git clone --depth 1 --branch notebooks "$TOKEN_URL" notebooks-repo 2>/dev/null || {
            echo "::error::notebooks branch not found. Run deploy.yml first."
            exit 1
          }
          cd notebooks-repo

          # Add each locale's notebooks to its subdirectory
          for dir in ../locale-notebooks/notebooks-*; do
            [ -d "$dir" ] || continue
            locale=$(basename "$dir" | sed 's/^notebooks-//')
            rm -rf "$locale"
            cp -r "$dir" "$locale"
          done

          git add -A
          git diff --cached --quiet && echo "No notebook changes" && exit 0
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "Update translated notebooks ($(date -u +%Y-%m-%dT%H:%M:%SZ))"

          # Push with rebase-retry. deploy.yml (the EN job) can force-push the
          # notebooks branch concurrently (different concurrency group), which
          # would reject this non-force push as non-fast-forward. Retry a few
          # times, re-fetching + rebasing our locale-subdir commit on top of the
          # latest remote state each round. Our change touches only per-locale
          # subdirs, so it rebases cleanly over EN's force-push.
          for attempt in 1 2 3 4 5; do
            if git push "$TOKEN_URL" notebooks; then
              echo "Pushed notebooks (attempt $attempt)"
              exit 0
            fi
            echo "::warning::notebooks push rejected (attempt $attempt) — re-fetch + rebase"
            git fetch "$TOKEN_URL" notebooks
            git rebase FETCH_HEAD || { git rebase --abort; git reset --soft FETCH_HEAD; git add -A; \
              git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "Update translated notebooks ($(date -u +%Y-%m-%dT%H:%M:%SZ))"; }
            sleep $((attempt * 5))
          done
          echo "::error::notebooks push failed after 5 attempts"
          exit 1
