name: CI

# PR-time correctness gate. Before this existed, nothing ran `tsc` or a build on
# pull requests — type errors and MDX/JSX build breaks only surfaced after merge
# (deploy.yml builds on push to main). This catches both on the PR.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      # Pure-function unit tests for the translation pipeline (fast, no IO).
      - name: Python unit tests
        run: |
          python3 -m pip install --quiet pytest
          python3 -m pytest translation/scripts/tests/

      # Cheap and fast — would have caught the 4 long-standing tsc errors.
      - name: Type check
        run: npm run typecheck

      # Sync content so the build has docs/ to compile, then build EN only.
      # The full 27-locale build OOMs locally; per-locale CI builds are sharded
      # in deploy-locales.yml. EN is the correctness-representative gate here.
      - name: Sync content
        run: python3 scripts/sync-content.py

      - name: Build (EN)
        run: npm run build -- --locale en
        env:
          NODE_OPTIONS: --max-old-space-size=8192
