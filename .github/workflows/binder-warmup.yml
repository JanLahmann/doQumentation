name: Binder Warm-up

# Keep the QuBins 2.3-xl image hot in the mybinder federation cache so
# doQumentation users hit a ~30s warm-start instead of a 10-25 min cold
# build when QuBins hasn't shipped a new image in a while.
#
# QuBins runs its own warmer (binder-warmup.yml in QuBins/qiskit-images) on
# every Build matrix completion, but that's event-driven — when QuBins is
# quiet for several days the cache can evict. This is a small belt-and-
# braces daily cron specifically for the tag doQumentation pins in
# src/config/jupyter.ts. Bump in lockstep when the pin moves.
#
# mybinder's /build/gh/<owner>/<repo>/<ref> endpoint serves a
# text/event-stream while building (or pulling, for stub-branch images).
# We close as soon as we see `phase: ready` and exit cleanly. Build
# failures emit an annotation but don't fail the workflow — mybinder is a
# shared community service and a flaky backend isn't ours to escalate.

on:
  schedule:
    # 05:30 UTC = 06:30 CET (winter) / 07:30 CEST (summer).
    # Targets the before-workday window when European workshop runs start.
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  warm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        federation:
          - name: 2i2c
            url: https://2i2c.mybinder.org/build/gh/QuBins/qiskit-images/2.3-xl
          - name: BIDS
            url: https://bids.mybinder.org/build/gh/QuBins/qiskit-images/2.3-xl
    name: Warm ${{ matrix.federation.name }}
    steps:
      - name: Trigger Binder build on ${{ matrix.federation.name }}
        run: |
          curl -s --max-time 1200 \
            -H "Accept: text/event-stream" \
            "${{ matrix.federation.url }}" \
          | while IFS= read -r line; do
              echo "$line"
              if echo "$line" | grep -q '"phase": "ready"'; then
                echo "Image is ready on ${{ matrix.federation.name }}."
                exit 0
              fi
              if echo "$line" | grep -q '"phase": "failed"'; then
                echo "::warning::Binder build failed on ${{ matrix.federation.name }}."
                exit 0
              fi
            done
