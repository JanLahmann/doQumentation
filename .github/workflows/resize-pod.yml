name: Resize CE Pod

# Resize doqumentation-02 (or any pod by name) to a different CPU/memory
# size, without rebuilding the image. Useful for instructors who want to scale
# up before a workshop or scale down after, without learning the ibmcloud CLI.
#
# IBM Cloud Code Engine forces fixed CPU/memory combinations:
#   https://github.com/ibm-cloud-docs/codeengine/blob/master/mem-cpu-combo.md
# This workflow exposes only the validated combinations our project uses.
#
# Sizing recommendations from stress testing (see .claude/STRESS-TEST-FINDINGS.md):
#   1 vCPU /  4 GB → solo dev / smoke testing only
#   2 vCPU /  8 GB → tight, ~10-15 user workshops
#   4 vCPU /  8 GB → 25-30 users (Run 3 baseline)
#   8 vCPU / 16 GB → 80 users with retries (Run 8 result) ← workshop sweet spot
#   12 vCPU / 24 GB → 80-100 users (Run 6 result)

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'CE project name'
        default: 'doQumentation-02'
        type: string
      app_name:
        description: 'CE app name'
        default: 'doqumentation-02'
        type: string
      size:
        description: 'Pod size (CPU / memory). Recommended: 8/16 for 30-50 users, 12/24 for 50-80 users.'
        required: true
        type: choice
        options:
          - '1 vCPU / 4 GB'
          - '2 vCPU / 8 GB'
          - '4 vCPU / 8 GB'
          - '4 vCPU / 16 GB'
          - '8 vCPU / 16 GB'
          - '8 vCPU / 32 GB'
          - '12 vCPU / 24 GB'
          - '12 vCPU / 48 GB'

permissions:
  contents: read

jobs:
  resize:
    runs-on: ubuntu-latest
    steps:
      - name: Parse size selection
        id: parse
        env:
          SIZE: ${{ github.event.inputs.size }}
        run: |
          # SIZE is like "8 vCPU / 16 GB" — extract the two numbers
          CPU=$(echo "$SIZE" | sed -E 's/^([0-9]+) vCPU.*/\1/')
          MEM=$(echo "$SIZE" | sed -E 's/.*\/ ([0-9]+) GB.*/\1G/')
          if [ -z "$CPU" ] || [ -z "$MEM" ]; then
            echo "ERROR: Could not parse size '$SIZE'"
            exit 1
          fi
          echo "cpu=$CPU" >> "$GITHUB_OUTPUT"
          echo "memory=$MEM" >> "$GITHUB_OUTPUT"
          echo "Parsed: $CPU vCPU / $MEM"

      - name: Resize CE app
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
          PROJECT: ${{ inputs.project }}
          APP_NAME: ${{ github.event.inputs.app_name }}
          CPU: ${{ steps.parse.outputs.cpu }}
          MEMORY: ${{ steps.parse.outputs.memory }}
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install code-engine -f
          ibmcloud login --apikey "$IBM_CLOUD_API_KEY" -r eu-de -g Default --quiet
          ibmcloud ce project select --name "$PROJECT"

          echo "=== Current state of $APP_NAME ==="
          ibmcloud ce app get --name "$APP_NAME" 2>&1 | grep -E "CPU|Memory|Latest|Image|Running" | head -10 || {
            echo "ERROR: app '$APP_NAME' does not exist. Run the Code Engine Image workflow first to create it."
            exit 1
          }

          echo ""
          echo "=== Resizing $APP_NAME to $CPU vCPU / $MEMORY ==="
          ibmcloud ce app update \
            --name "$APP_NAME" \
            --cpu "$CPU" \
            --memory "$MEMORY"

          echo ""
          echo "=== New state of $APP_NAME ==="
          ibmcloud ce app get --name "$APP_NAME" 2>&1 | grep -E "CPU|Memory|Latest|Image|Running" | head -10

          echo ""
          echo "=== Done. Pod will cold-start on next request (~15-150s). ==="
