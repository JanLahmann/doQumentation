name: Binder Cache

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_run:
    workflows: ["Build and Deploy"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        binder:
          # Pinned to last working image (Apr 13) — mybinder Docker 28 broke cold builds
          # GESIS removed (301 redirect, instance decommissioned)
          # TODO: revert to 'notebooks' once mybinder builds work again
          - name: 2i2c
            url: https://2i2c.mybinder.org/build/gh/JanLahmann/doQumentation/0fc67252
          - name: BIDS
            url: https://bids.mybinder.org/build/gh/JanLahmann/doQumentation/0fc67252
    name: Warm ${{ matrix.binder.name }}
    steps:
      - name: Trigger Binder build on ${{ matrix.binder.name }}
        run: |
          curl -s --max-time 1200 \
            -H "Accept: text/event-stream" \
            "${{ matrix.binder.url }}" \
          | while IFS= read -r line; do
              echo "$line"
              if echo "$line" | grep -q '"phase": "ready"'; then
                echo "Binder image is ready on ${{ matrix.binder.name }}."
                exit 0
              fi
              if echo "$line" | grep -q '"phase": "failed"'; then
                echo "::error::Binder build failed on ${{ matrix.binder.name }}."
                exit 1
              fi
            done
