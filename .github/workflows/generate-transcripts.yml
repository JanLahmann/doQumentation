name: Generate Video Transcripts

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'src/components/CourseComponents/IBMVideo.tsx'
      - 'scripts/generate-transcripts.py'
      - '.github/workflows/generate-transcripts.yml'
  workflow_dispatch:
    inputs:
      video_id:
        description: 'IBM Video ID to transcribe (leave empty for all)'
        required: false
        default: ''
      model:
        description: 'Whisper model to use'
        required: false
        default: 'medium'
        type: choice
        options:
          - tiny
          - base
          - small
          - medium
          - large-v3

permissions:
  contents: write

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours — long videos with medium/large models

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install openai-whisper yt-dlp
          # ffmpeg is pre-installed on ubuntu-latest

      - name: Generate transcripts
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            args="--model ${{ inputs.model || 'medium' }}"
            if [ -n "${{ inputs.video_id }}" ]; then
              args="$args --video-id ${{ inputs.video_id }}"
            fi
          else
            # Push trigger: transcribe one video with tiny model as a smoke test
            args="--model tiny --video-id 134056207"
          fi
          python scripts/generate-transcripts.py $args

      - name: Commit transcripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/transcripts/
          git diff --cached --quiet && echo "No new transcripts" && exit 0
          model="${{ inputs.model || 'tiny' }}"
          git commit -m "Generate VTT transcripts via Whisper ($model)"
          git push
