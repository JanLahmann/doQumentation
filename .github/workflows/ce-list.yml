name: CE List Resources

# Quick reference: lists all CE projects, apps, and their config.
# Run manually before other CE workflows to see available targets.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install code-engine -f

      - name: Login
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
        run: |
          ibmcloud login --apikey "$IBM_CLOUD_API_KEY" -r eu-de -g Default --quiet

      - name: List all projects and apps
        run: |
          {
            echo "## CE Resources ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # CE project list JSON can be an array of objects or have .items[]
          PROJECTS=$(ibmcloud ce project list --output json 2>/dev/null \
            | jq -r 'if type == "array" then .[].name else .items[]?.name // empty end' 2>/dev/null || echo "")

          if [ -z "$PROJECTS" ]; then
            echo "No CE projects found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          for PROJECT in $PROJECTS; do
            ibmcloud ce project select --name "$PROJECT" --quiet 2>/dev/null || continue

            {
              echo "### Project: \`$PROJECT\`"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"

            APPS_JSON=$(ibmcloud ce app list --output json 2>/dev/null || echo '{"items":[]}')
            # CE returns {items: [...]} not a bare array
            APP_NAMES=$(echo "$APPS_JSON" | jq -r '.items[]?.metadata.name // empty' 2>/dev/null)

            if [ -z "$APP_NAMES" ]; then
              echo "No apps." >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            {
              echo "| App | CPU | Memory | Min/Max Scale | Instances | Image | Revision |"
              echo "|---|---|---|---|---|---|---|"
            } >> "$GITHUB_STEP_SUMMARY"

            for APP_NAME in $APP_NAMES; do
              APP_DETAIL=$(ibmcloud ce app get --name "$APP_NAME" --output json 2>/dev/null)

              CPU=$(echo "$APP_DETAIL" | jq -r '.spec.template.spec.containers[0].resources.limits.cpu // "?"')
              MEM=$(echo "$APP_DETAIL" | jq -r '.spec.template.spec.containers[0].resources.limits.memory // "?"')
              MIN_S=$(echo "$APP_DETAIL" | jq -r '.spec.template.metadata.annotations["autoscaling.knative.dev/minScale"] // "?"')
              MAX_S=$(echo "$APP_DETAIL" | jq -r '.spec.template.metadata.annotations["autoscaling.knative.dev/maxScale"] // "?"')
              IMAGE=$(echo "$APP_DETAIL" | jq -r '.spec.template.spec.containers[0].image // "?"' | sed 's|.*/||')
              REV=$(echo "$APP_DETAIL" | jq -r '.status.latestReadyRevisionName // "?"')

              # Check running instances
              INSTANCES="0"
              if [ -n "$REV" ] && [ "$REV" != "?" ]; then
                INSTANCES=$(ibmcloud ce revision get --name "$REV" --output json 2>/dev/null \
                  | jq -r '.status.readyReplicas // 0' 2>/dev/null || echo "?")
              fi

              echo "| \`$APP_NAME\` | $CPU | $MEM | $MIN_S / $MAX_S | $INSTANCES | $IMAGE | $REV |" >> "$GITHUB_STEP_SUMMARY"
            done

            echo "" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Use these project/app names as inputs for other CE workflows." >> "$GITHUB_STEP_SUMMARY"
