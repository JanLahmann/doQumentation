name: CE Monitor (cost & config watchdog)

# Monitors IBM Cloud Code Engine projects for unexpected costs:
#   - Every 2h: alerts if any instance is running (should be scaled to zero
#     when idle — a running instance means either active use or a stuck pod)
#   - Every 2h: alerts if any app is configured with >1 vCPU (workshop sizes
#     should be temporary; this catches forgotten resize-ups)
#   - Daily (06:00 UTC): posts a full summary of all projects, apps, and their
#     config to the job summary
#
# All alerts go to GitHub Actions job summary + annotations (warnings).
# To also get notifications: enable GitHub Actions notification emails,
# or add a Slack/email step.

on:
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours
  workflow_dispatch:
    inputs:
      force_summary:
        description: 'Force daily summary (even if not 06:00 UTC)'
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install code-engine -f

      - name: Login
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
        run: |
          ibmcloud login --apikey "$IBM_CLOUD_API_KEY" -r eu-de -g Default --quiet

      - name: Check all CE projects
        id: check
        run: |
          HOUR=$(date -u +%H)
          IS_DAILY="false"
          if [ "$HOUR" = "06" ] || [ "${{ github.event.inputs.force_summary }}" = "true" ]; then
            IS_DAILY="true"
          fi
          echo "is_daily=$IS_DAILY" >> "$GITHUB_OUTPUT"

          # Collect data from all projects
          PROJECTS=$(ibmcloud ce project list --output json 2>/dev/null \
            | jq -r 'if type == "array" then .[].name else .items[]?.name // empty end' 2>/dev/null || echo "")
          if [ -z "$PROJECTS" ]; then
            echo "No CE projects found."
            echo "has_alerts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ALERTS=""
          SUMMARY=""
          HAS_RUNNING="false"
          HAS_OVERSIZED="false"

          for PROJECT in $PROJECTS; do
            echo "=== Checking project: $PROJECT ==="
            ibmcloud ce project select --name "$PROJECT" --quiet 2>/dev/null || continue

            # Get all apps in this project
            APPS_JSON=$(ibmcloud ce app list --output json 2>/dev/null || echo '{"items":[]}')
            APP_NAMES=$(echo "$APPS_JSON" | jq -r '.items[]?.metadata.name // empty' 2>/dev/null)

            if [ -z "$APP_NAMES" ]; then
              SUMMARY="${SUMMARY}\n### Project: \`$PROJECT\`\nNo apps.\n"
              continue
            fi

            SUMMARY="${SUMMARY}\n### Project: \`$PROJECT\`\n\n| App | CPU | Memory | Min/Max | Instances | Status |\n|---|---|---|---|---|---|\n"

            for APP_NAME in $APP_NAMES; do
              APP_DETAIL=$(ibmcloud ce app get --name "$APP_NAME" --output json 2>/dev/null)

              CPU=$(echo "$APP_DETAIL" | jq -r '.spec.template.spec.containers[0].resources.limits.cpu // "?"')
              MEM=$(echo "$APP_DETAIL" | jq -r '.spec.template.spec.containers[0].resources.limits.memory // "?"')
              MIN_SCALE=$(echo "$APP_DETAIL" | jq -r '.spec.template.metadata.annotations["autoscaling.knative.dev/minScale"] // "?"')
              MAX_SCALE=$(echo "$APP_DETAIL" | jq -r '.spec.template.metadata.annotations["autoscaling.knative.dev/maxScale"] // "?"')
              READY=$(echo "$APP_DETAIL" | jq -r '.status.conditions[] | select(.type=="Ready") | .status')

              # Check for running instances via the revision's ready replicas
              LATEST_REV=$(echo "$APP_DETAIL" | jq -r '.status.latestReadyRevisionName // ""')
              INSTANCES="0"
              if [ -n "$LATEST_REV" ]; then
                INSTANCES=$(ibmcloud ce revision get --name "$LATEST_REV" --output json 2>/dev/null \
                  | jq -r '.status.readyReplicas // 0' 2>/dev/null || echo "?")
              fi

              STATUS_EMOJI="idle"
              if [ "$INSTANCES" != "0" ] && [ "$INSTANCES" != "?" ]; then
                STATUS_EMOJI="**RUNNING**"
                HAS_RUNNING="true"
                ALERTS="${ALERTS}::warning::Instance running: ${PROJECT}/${APP_NAME} (${CPU} vCPU, ${INSTANCES} instance(s))\n"
              fi

              # Check for oversized apps (>1 CPU)
              CPU_NUM=$(echo "$CPU" | sed 's/[^0-9]//g')
              if [ -n "$CPU_NUM" ] && [ "$CPU_NUM" -gt 1 ] 2>/dev/null; then
                HAS_OVERSIZED="true"
                ALERTS="${ALERTS}::warning::Oversized app: ${PROJECT}/${APP_NAME} configured with ${CPU} vCPU (>1)\n"
              fi

              SUMMARY="${SUMMARY}| \`$APP_NAME\` | $CPU | $MEM | $MIN_SCALE/$MAX_SCALE | $INSTANCES | $STATUS_EMOJI |\n"
            done
          done

          # Write outputs
          if [ "$HAS_RUNNING" = "true" ] || [ "$HAS_OVERSIZED" = "true" ]; then
            echo "has_alerts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_alerts=false" >> "$GITHUB_OUTPUT"
          fi

          # Save for later steps
          {
            echo "ALERTS<<ALERTS_EOF"
            echo -e "$ALERTS"
            echo "ALERTS_EOF"
            echo "SUMMARY<<SUMMARY_EOF"
            echo -e "$SUMMARY"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_ENV"

      - name: Post alerts (every 2h if any)
        if: env.ALERTS != ''
        run: |
          {
            echo "## CE Monitor Alerts"
            echo ""
            echo "$ALERTS"
            echo ""
            echo "**Action needed**: If these instances are not actively in use, run [Workshop Close](../../../actions/workflows/workshop-close.yml) or resize via [Resize Pod](../../../actions/workflows/resize-pod.yml)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post daily summary
        if: steps.check.outputs.is_daily == 'true'
        run: |
          {
            echo "## CE Daily Summary ($(date -u +%Y-%m-%d))"
            echo ""
            if [ -z "$SUMMARY" ]; then
              echo "No CE projects found."
            else
              echo "$SUMMARY"
            fi
            echo ""
            echo "---"
            echo ""
            echo "Alerts (if any):"
            echo ""
            if [ -z "$ALERTS" ]; then
              echo "None — all apps idle and correctly sized."
            else
              echo "$ALERTS"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Annotate if alerts
        if: env.ALERTS != ''
        run: |
          echo "$ALERTS" | while IFS= read -r line; do
            [ -n "$line" ] && echo "$line"
          done
