name: Build and Push Docker Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      # Files that affect the built images. Anything not in this list
      # (notebook content, docs, CI scaffolding, etc.) won't trigger
      # a 15-minute multi-arch rebuild.
      - 'Dockerfile.jupyter'
      - 'Dockerfile.web'
      - 'binder/**'
      - 'nginx.conf'
      - 'scripts/docker-entrypoint.sh'
      - '.github/workflows/docker.yml'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Lightweight image: nginx serving static site (~60 MB)
  build-lite:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push (lite)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=lite
          cache-to: type=gha,mode=max,scope=lite

  # Full image: nginx + Jupyter + Qiskit (~3 GB)
  build-jupyter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=jupyter,enable={{is_default_branch}}
            type=sha,prefix=,suffix=-jupyter

      - name: Build and push (jupyter)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jupyter
          target: jupyter-local
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=jupyter
          cache-to: type=gha,mode=max,scope=jupyter
