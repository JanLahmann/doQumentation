name: Build and Push Docker Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    # Rebuild the :jupyter image only when its build inputs change — NOT on
    # docs/i18n content merges. Those land constantly (weekly translation PRs)
    # and would rebuild the ~3 GB multi-arch image needlessly; the live site
    # ships via gh-pages separately. To refresh the image's baked content,
    # dispatch this workflow manually.
    paths:
      - 'Dockerfile.jupyter'
      - 'scripts/docker-entrypoint.sh'
      - 'scripts/sync-content.py'
      - 'binder/**'
      - 'nginx.conf'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docker.yml'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege baseline; jobs escalate to packages:write where needed.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Full image: nginx + Jupyter + Qiskit (~3 GB), :jupyter tag.
  # (The former build-lite job / :latest static-site image was removed — it
  # served the same site jupyter-local already ships and had been broken since
  # its Dockerfile was renamed; see #220.)
  build-jupyter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=jupyter,enable={{is_default_branch}}
            type=sha,prefix=,suffix=-jupyter

      - name: Build and push (jupyter)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.jupyter
          target: jupyter-local
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=jupyter
          cache-to: type=gha,mode=max,scope=jupyter
