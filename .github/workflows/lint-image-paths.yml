name: Lint Image Paths

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'i18n/**'
      - 'scripts/sync-content.py'
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject legacy notebook image layout
        run: |
          set -e
          # Reject relative ./_<stem>_imgs/ image refs in MDX
          if grep -rEn '\]\(\./_[^)]+_imgs/' --include='*.mdx' docs i18n; then
            echo "::error::Found relative ./_<stem>_imgs/ image refs in MDX. Use absolute /img/<section>/<slug>/ paths. See PROJECT_HANDOFF.md 'Image asset placement'." >&2
            exit 1
          fi
          # Reject committed _*_imgs/ directories under docs/ or i18n/
          legacy_dirs=$(find docs i18n -type d -name '_*_imgs' 2>/dev/null || true)
          if [ -n "$legacy_dirs" ]; then
            echo "::error::Legacy _*_imgs/ directories committed under docs/ or i18n/:" >&2
            echo "$legacy_dirs" >&2
            echo "::error::Notebook output PNGs belong in static/img/<section>/<slug>/. See PROJECT_HANDOFF.md 'Image asset placement'." >&2
            exit 1
          fi
          echo "✓ no legacy image layout detected"
