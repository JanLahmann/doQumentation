name: Check Translation Freshness

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 6am UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync upstream content
        run: python3 scripts/sync-content.py

      - name: Update translation status
        run: python3 translation/scripts/translation-status.py --write-status

      - name: Commit status if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add translation/STATUS.md
          git diff --cached --quiet || git commit -m "Update translation/STATUS.md [ci skip]" && git push

      - name: Check translation freshness
        id: check
        run: |
          set +e
          python3 translation/scripts/check-translation-freshness.py --all-locales 2>&1 | tee freshness-report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Create or update issue if critical
        if: steps.check.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const fullReport = fs.readFileSync('freshness-report.txt', 'utf8');
            const title = 'Stale translations detected';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'translation-freshness',
            });
            // GitHub issue body limit is 65536 chars. Summarize per-locale counts and
            // include only the first chunk of detail; full report is in the workflow logs.
            const lines = fullReport.split('\n');
            const counts = {};
            for (const line of lines) {
              const m = line.match(/^(CRITICAL|STALE)\s+(\S+)/);
              if (!m) continue;
              const key = `${m[1]} ${m[2]}`;
              counts[key] = (counts[key] || 0) + 1;
            }
            const summary = Object.entries(counts).sort().map(
              ([k, v]) => `${k.padEnd(16)} ${v}`
            ).join('\n');
            // Include first ~50000 chars of detail (leaves room for headers/footers under 65536 limit)
            const MAX_DETAIL = 50000;
            const truncated = fullReport.length > MAX_DETAIL;
            const detail = truncated
              ? fullReport.slice(0, MAX_DETAIL) + `\n\n... (truncated; ${fullReport.length - MAX_DETAIL} more chars in workflow logs)`
              : fullReport;
            const body = [
              '## Translation Freshness Report',
              '',
              '### Summary (count per locale + status)',
              '```',
              summary,
              '```',
              '',
              '### Detail',
              '```',
              detail,
              '```',
              '',
              'CRITICAL = missing imports or components (features broken on locale sites)',
              'STALE = EN source changed since translation (content outdated)',
              '',
              'To fix: propagate EN changes to affected files, then run:',
              '```bash',
              'python translation/scripts/check-translation-freshness.py --stamp --all-locales',
              '```',
              '',
              '_Auto-generated by check-translations workflow_',
            ].join('\n');
            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body,
              });
              console.log(`Updated issue #${issues.data[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['translation-freshness'],
              });
              console.log(`Created issue #${created.data.number}`);
            }
