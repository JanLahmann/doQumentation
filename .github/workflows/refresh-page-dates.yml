name: Refresh Page Dates

# Daily refresh of src/config/upstreamFileMeta.json (per-file upstream + EN
# dates used by the source-date footer). Does NOT sync content — only the
# metadata manifest is regenerated. If the manifest has changed, commit it
# and let deploy.yml pick up the new dates on the next push trigger.
#
# Runs at 07:00 UTC, after check-translations.yml (06:00 UTC) so that any
# translation/STATUS.md commit from that workflow has already landed.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          # Need full history of docs/ in this repo (en_date) and the ability
          # to fetch the ibm remote in upstream-docs (upstream_date).
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Refresh page-dates manifest
        run: python3 scripts/sync-content.py --meta-only

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/config/upstreamFileMeta.json src/config/contentMeta.ts
          if git diff --cached --quiet; then
            echo "No date changes — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh page-dates manifest [ci]"
          git push
