name: Translate Video Transcripts

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'IBM Video ID to translate (leave empty for all)'
        required: false
        default: ''
      locale:
        description: 'Target locale'
        required: true
        type: choice
        options:
          - de
          - ja
          - uk
          - es
          - fr
          - it
          - pt
          - tl
          - th
          - ar
          - he
      model:
        description: 'Claude model to use'
        required: false
        default: 'claude-sonnet-4-20250514'
      force:
        description: 'Overwrite existing translations'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Translate transcripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          args="--locale ${{ inputs.locale }} --model ${{ inputs.model || 'claude-sonnet-4-20250514' }}"
          if [ -n "${{ inputs.video_id }}" ]; then
            args="$args --video-id ${{ inputs.video_id }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            args="$args --force"
          fi
          python scripts/translate-transcripts.py $args

      - name: Commit translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/transcripts/
          git diff --cached --quiet && echo "No new translations" && exit 0
          git commit -m "Translate transcripts to ${{ inputs.locale }}"
          git push
