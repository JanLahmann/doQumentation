# Dependabot — automated dependency-update PRs (security + version).
# Covers the ecosystems present in this repo: npm (Docusaurus site),
# GitHub Actions, Docker, and pip (the Jupyter/CE image requirements).
# Weekly cadence, grouped to keep PR volume manageable.
version: 2
updates:
  # Docusaurus site dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    ignore:
      # Hold TypeScript on 6.x: TS 7.0 removed the `baseUrl` option that
      # tsconfig.json still needs for the @docusaurus/tsconfig base (see the
      # note in tsconfig.json). Adopt 7.x deliberately alongside a Docusaurus
      # upgrade that drops that reliance — not via an automated major bump.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "@easyops-cn/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"

  # GitHub Actions versions (catches the @master/@beta drift; once SHA-pinned,
  # Dependabot keeps the pin's comment current too).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Container base images / Dockerfile FROM pins
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3

  # Jupyter / Code Engine image Python requirements
  - package-ecosystem: "pip"
    directory: "/binder"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
